<script>
        // Micro-interaction for score ticking
        document.addEventListener('DOMContentLoaded', () => {
            const animateValue = (id, start, end, duration) => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    const currentVal = Math.floor(progress * (end - start) + start);
                    const element = document.getElementById(id);
                    if (element) element.innerHTML = currentVal;
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            };

            // Only run if we actually had IDs set, adding them dynamically for demo
            const scoreVal = document.querySelector('.text-primary.text-headline-lg');
            if (scoreVal) {
                const final = parseInt(scoreVal.innerText);
                scoreVal.id = 'final-score-val';
                animateValue('final-score-val', 0, final, 1500);
            }
        });

        // Background parallax effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const bg = document.querySelector('.bg-cover');
            if (bg) {
                bg.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
            }
        });
    </script>
